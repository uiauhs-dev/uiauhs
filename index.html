<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 60px 48px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 8px 20px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .card h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 12px;
        }

        .card p {
            color: #718096;
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f0fff4;
            color: #38a169;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .status::before {
            content: '';
            width: 10px;
            height: 10px;
            background: #48bb78;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .time {
            margin-top: 28px;
            font-size: 0.85rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>一切就绪</h1>
        <p>页面已成功部署，你可以开始编辑 <code>index.html</code> 来构建你想要的内容。</p>
        <div class="status">运行中</div>
        <div class="time" id="time"></div>
    </div>

    <script>
        const el = document.getElementById('time');
        const now = new Date();
        el.textContent = `部署时间：${now.toLocaleString('zh-CN')}`;
    </script>
</body>
</html>
